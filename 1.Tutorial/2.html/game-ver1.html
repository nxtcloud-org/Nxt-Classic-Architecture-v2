<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박스 피하기 게임</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
  canvas { border: 2px solid #444; background: #1a1a2e; }
  #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; }
  #ui h1 { font-size: 32px; margin-bottom: 16px; }
  #ui p { font-size: 16px; margin-bottom: 8px; color: #aaa; }
  #ui button { padding: 12px 32px; font-size: 18px; background: #e94560; color: #fff; border: none; cursor: pointer; font-family: monospace; margin-top: 12px; }
  #ui button:hover { background: #ff6b81; }
  #score { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 24px; font-family: monospace; }
</style>
</head>
<body>

<div id="score" style="display:none">점수: <span id="scoreValue">0</span></div>
<canvas id="game"></canvas>

<div id="ui">
  <h1>박스 피하기</h1>
  <p>← → 방향키 또는 마우스로 이동</p>
  <p>떨어지는 박스를 피하세요!</p>
  <button onclick="startGame()">시작</button>
</div>

<script>
// ===== 설정 (자유롭게 수정하세요!) =====
const CONFIG = {
  canvasWidth: 400,
  canvasHeight: 600,

  // 플레이어
  playerWidth: 40,
  playerHeight: 40,
  playerColor: '#00d2ff',
  playerSpeed: 6,

  // 장애물
  boxWidth: 40,
  boxHeight: 40,
  boxColor: '#e94560',
  boxSpeed: 3,          // 낙하 속도
  boxSpawnRate: 60,     // 프레임 간격 (작을수록 자주 생성)
};
// ========================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CONFIG.canvasWidth;
canvas.height = CONFIG.canvasHeight;

const ui = document.getElementById('ui');
const scoreDiv = document.getElementById('score');
const scoreValue = document.getElementById('scoreValue');

let player, boxes, score, gameOver, frameCount;
let keys = {};

// 플레이어 객체
function createPlayer() {
  return {
    x: canvas.width / 2 - CONFIG.playerWidth / 2,
    y: canvas.height - CONFIG.playerHeight - 20,
    w: CONFIG.playerWidth,
    h: CONFIG.playerHeight,
  };
}

// 장애물 생성
function spawnBox() {
  const x = Math.random() * (canvas.width - CONFIG.boxWidth);
  boxes.push({ x, y: -CONFIG.boxHeight, w: CONFIG.boxWidth, h: CONFIG.boxHeight });
}

// 충돌 감지
function isColliding(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// 게임 루프
function update() {
  if (gameOver) return;

  frameCount++;

  // 플레이어 이동
  if (keys['ArrowLeft'])  player.x -= CONFIG.playerSpeed;
  if (keys['ArrowRight']) player.x += CONFIG.playerSpeed;

  // 벽 제한
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

  // 장애물 생성
  if (frameCount % CONFIG.boxSpawnRate === 0) spawnBox();

  // 장애물 이동 & 충돌
  for (let i = boxes.length - 1; i >= 0; i--) {
    boxes[i].y += CONFIG.boxSpeed;

    if (isColliding(player, boxes[i])) {
      gameOver = true;
      endGame();
      return;
    }

    // 화면 밖으로 나가면 제거 + 점수
    if (boxes[i].y > canvas.height) {
      boxes.splice(i, 1);
      score++;
    }
  }

  scoreValue.textContent = score;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 플레이어
  ctx.fillStyle = CONFIG.playerColor;
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // 장애물
  ctx.fillStyle = CONFIG.boxColor;
  for (const box of boxes) {
    ctx.fillRect(box.x, box.y, box.w, box.h);
  }
}

function gameLoop() {
  update();
  draw();
  if (!gameOver) requestAnimationFrame(gameLoop);
}

function startGame() {
  player = createPlayer();
  boxes = [];
  score = 0;
  gameOver = false;
  frameCount = 0;

  ui.style.display = 'none';
  scoreDiv.style.display = 'block';
  scoreValue.textContent = '0';

  gameLoop();
}

function endGame() {
  ui.innerHTML = `
    <h1>게임 오버</h1>
    <p>점수: ${score}</p>
    <button onclick="startGame()">다시 하기</button>
  `;
  ui.style.display = 'block';
  scoreDiv.style.display = 'none';
}

// 키보드 입력
document.addEventListener('keydown', (e) => { keys[e.key] = true; });
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

// 마우스/터치 입력
canvas.addEventListener('mousemove', (e) => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  player.x = e.clientX - rect.left - player.w / 2;
});

canvas.addEventListener('touchmove', (e) => {
  if (gameOver) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  player.x = e.touches[0].clientX - rect.left - player.w / 2;
}, { passive: false });
</script>

</body>
</html>
